<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DealWatch MX Marketplace</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>🛒 DealWatch MX Marketplace</h1>

<div class="filters">
  <button onclick="filterAll()">Todo</button>
  <button onclick="filterByStore('aliexpress')">AliExpress</button>
  <button onclick="filterByStore('amazon')">Amazon</button>
  <button onclick="filterByStore('mercadolibre')">Mercado Libre</button>
</div>

<div id="productGrid"></div>

<script src="app.js"></script>
</body>
</html>
