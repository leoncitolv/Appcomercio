name: DealWatch MX - Revisar ofertas

on:
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Enviar mensaje de prueba a Telegram"
        required: false
        type: boolean
        default: false
      force_send_offers:
        description: "Forzar envío de ofertas aunque ya se hayan avisado en las últimas 24 horas"
        required: false
        type: boolean
        default: false
  schedule:
    # Cada 6 horas, minuto 17 UTC. Cambia este cron si quieres otro horario.
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: dealwatch-price-monitor
  cancel-in-progress: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Revisar reglas de oferta y notificar Telegram
        run: node scripts/check-prices.mjs
        env:
          SUPABASE_URL: "https://ltsrjxvisptbdhhkabhj.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TEST: ${{ github.event_name == 'workflow_dispatch' && inputs.telegram_test || false }}
          FORCE_SEND_OFFERS: ${{ github.event_name == 'workflow_dispatch' && inputs.force_send_offers || false }}
          AUTO_FETCH_ENEBA: "true"
          DEALWATCH_MODE: "rules_only_telegram_eneba"
