name: DealWatch MX - Revisar ofertas

on:
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Enviar mensaje de prueba a Telegram"
        required: false
        type: boolean
        default: false
      live_prices:
        description: "Intentar actualizar precios reales de Mercado Libre con diagnóstico"
        required: false
        type: boolean
        default: true
  schedule:
    # Cada 6 horas, minuto 17 UTC. Cambia este cron si quieres otro horario.
    - cron: "17 */6 * * *"

permissions:
  contents: read

concurrency:
  group: dealwatch-price-monitor
  cancel-in-progress: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Revisar Mercado Libre estable, reglas de oferta y Telegram
        run: node scripts/check-prices.mjs
        env:
          SUPABASE_URL: "https://ltsrjxvisptbdhhkabhj.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TEST: ${{ github.event_name == 'workflow_dispatch' && inputs.telegram_test || false }}
          DEALWATCH_LIVE_PRICES: ${{ github.event_name == 'workflow_dispatch' && inputs.live_prices || true }}
          DEALWATCH_MODE: "mercadolibre_stable_auto_telegram"
