name: DealWatch MX - Revisar ofertas

on:
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Enviar mensaje de prueba a Telegram"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    - cron: "0 */6 * * *"

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ejecutar revisión de ofertas
        env:
          SUPABASE_URL: "https://ltsrjxvisptbdhhkabhj.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TEST: ${{ github.event.inputs.telegram_test }}
        run: node scripts/check-prices.mjs
