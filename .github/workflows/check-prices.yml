name: Check prices

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping-deployed-app:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger protected price check
        run: |
          curl -sS -X POST "$DEALWATCH_URL/api/cron/check" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --fail
        env:
          DEALWATCH_URL: ${{ secrets.DEALWATCH_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
