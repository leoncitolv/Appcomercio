services:
  - type: web
    name: dealwatch-mx
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: DealWatch MX
      - key: DB_PATH
        value: ./data/dealwatch.db
      - key: JWT_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
